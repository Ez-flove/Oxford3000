version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: oxford3000_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: oxford3000
      MYSQL_USER: oxford_user
      MYSQL_PASSWORD: oxford_password
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql

  adminer:
    image: adminer:latest
    container_name: oxford3000_adminer
    restart: always
    ports:
      - '8080:8080'
    depends_on:
      - mysql

volumes:
  mysql_data:
